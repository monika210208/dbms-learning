<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DBMS Learning App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>📚 DBMS Learning App</h1>
</header>

<nav>
    <button onclick="showTab('learn')">Learn</button>
    <button onclick="showTab('sql')">SQL Practice</button>
    <button onclick="showTab('quiz')">Quiz</button>
</nav>

<!-- LEARN -->
<section id="learn" class="tab">
    <h2>What is DBMS?</h2>
    <p>DBMS helps manage and organize data efficiently.</p>

    <h3>Key Concepts</h3>
    <ul>
        <li>Tables</li>
        <li>Primary Key</li>
        <li>Foreign Key</li>
        <li>Normalization</li>
    </ul>
</section>

<!-- SQL -->
<section id="sql" class="tab hidden">
    <h2>SQL Simulator</h2>
    <textarea id="query" placeholder="Try: SELECT * FROM students"></textarea>
    <button onclick="runQuery()">Run</button>
    <div id="result"></div>
</section>

<!-- QUIZ -->
<section id="quiz" class="tab hidden">
    <h2>Quick Quiz</h2>
    <p id="question"></p>
    <div id="answers"></div>
    <p id="score"></p>
</section>

<script src="script.js"></script>
</body>
</html>

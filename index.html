<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DBMS Pro Learning</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <!-- SIDEBAR -->
    <aside>
        <h2>📚 DBMS Pro</h2>
        <button onclick="showPage('dashboard')">Dashboard</button>
        <button onclick="showPage('learn')">Learn</button>
        <button onclick="showPage('sql')">SQL Lab</button>
        <button onclick="showPage('quiz')">Quiz</button>
        <button onclick="toggleDarkMode()">🌙 Dark Mode</button>
    </aside>

    <!-- MAIN CONTENT -->
    <main>

        <!-- DASHBOARD -->
        <section id="dashboard" class="page">
            <h1>Welcome 👋</h1>
            <p>Learn DBMS interactively like a pro.</p>
        </section>

        <!-- LEARN -->
        <section id="learn" class="page hidden">
            <h1>Concept Explorer</h1>
            <div id="concepts"></div>
        </section>

        <!-- SQL LAB -->
        <section id="sql" class="page hidden">
            <h1>SQL Lab</h1>
            <textarea id="query" placeholder="Try: SELECT * FROM students"></textarea>
            <button onclick="runQuery()">Run Query</button>
            <div id="output"></div>
        </section>

        <!-- QUIZ -->
        <section id="quiz" class="page hidden">
            <h1>Quiz</h1>
            <p id="q"></p>
            <div id="options"></div>
            <p id="score"></p>
        </section>

    </main>
</div>

<script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DBMS Learning Hub</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>📚 DBMS Learning Hub</h1>
    <p>Learn Database Concepts + Practice SQL</p>
</header>

<section class="card">
    <h2>What is DBMS?</h2>
    <p>A Database Management System (DBMS) helps store, manage, and retrieve data efficiently.</p>
</section>

<section class="card">
    <h2>Types of DBMS</h2>
    <ul>
        <li>Hierarchical</li>
        <li>Network</li>
        <li>Relational (RDBMS)</li>
        <li>NoSQL</li>
    </ul>
</section>

<section class="card">
    <h2>Try SQL (Simulation)</h2>

    <textarea id="query" placeholder="Enter SQL query..."></textarea>
    <button onclick="runQuery()">Run Query</button>

    <div id="result"></div>
</section>

<footer>
    <p>Made for learning DBMS 🚀</p>
</footer>

<script src="script.js"></script>
</body>
</html>

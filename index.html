<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DBMS Mastery</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>📚 DBMS Mastery Platform</h1>
<p>Learn DBMS from basics to advanced</p>
</header>

<nav>
<button onclick="show('intro')">Intro</button>
<button onclick="show('ermodel')">ER Model</button>
<button onclick="show('relational')">Relational</button>
<button onclick="show('normalization')">Normalization</button>
<button onclick="show('sql')">SQL</button>
<button onclick="show('quiz')">Quiz</button>
</nav>

<section id="intro">
<h2>📘 What is DBMS?</h2>
<p>A DBMS is software that manages databases efficiently.</p>
</section>

<section id="ermodel" class="hidden">
<h2>📊 ER Model</h2>
<button onclick="toggle('er1')">Entities</button>
<div id="er1" class="hidden">Objects like Student, Course</div>
</section>

<section id="relational" class="hidden">
<h2>📋 Relational Model</h2>
<p>Data is stored in tables.</p>
</section>

<section id="normalization" class="hidden">
<h2>📉 Normalization</h2>
<button onclick="toggle('nf1')">1NF</button>
<div id="nf1" class="hidden">No repeating groups</div>
</section>

<section id="sql" class="hidden">
<h2>💻 SQL Playground</h2>
<textarea id="query"></textarea>
<button onclick="runQuery()">Run</button>
<div id="output"></div>
</section>

<section id="quiz" class="hidden">
<h2>🧠 Quiz</h2>
<p id="q"></p>
<div id="opts"></div>
<p id="score"></p>
</section>

<script src="script.js"></script>
</body>
</html>
